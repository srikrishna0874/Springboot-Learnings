spring.application.name=prod-ready-features

spring.datasource.url=jdbc:mysql://localhost:3306/prod-ready-features?useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


spring.devtools.restart.enabled=true
spring.devtools.restart.exclude=com/springboot/prod_ready_features/dto/**


server.port=9000
employeeService.base.url=http://localhost:8080/

# LOGGING CONFIGURATION
logging.level.com.springboot.prod_ready_features.clients=TRACE
logging.level.com.springboot.prod_ready_features.config=INFO
logging.pattern.console=%d{dd-mm-yyy hh:mm:ss} [%level] [%c{2.}]---%m %n
logging.file.name=application.log